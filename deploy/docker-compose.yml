services:
  tarot-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    restart: unless-stopped
    volumes:
      - ../data:/app/data       # состояние (SQLite) — переживает рестарт
      - ../media:/app/media     # картинки карт
    # один контейнер = один процесс = одна сессия. Не масштабировать репликами.
